<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>thundrex — Dev Playground</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Red+Hat+Text:ital,wght@0,300..700;1,300..700&family=Red+Hat+Mono:wght@300..700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--tx-bg, #F5F6FA);
      font-family: 'Red Hat Text', system-ui, sans-serif;
      color: var(--tx-text, #111827);
      padding: 40px;
      max-width: 720px;
      margin: 0 auto;
    }
    h1 { font-size: 1.5rem; font-weight: 700; margin-bottom: 8px; }
    p.sub { font-size: 0.88rem; color: #4B5563; margin-bottom: 32px; }
    section { margin-bottom: 32px; }
    section h2 { font-size: 0.65rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.1em; color: #9CA3AF; margin-bottom: 12px; }
    .row { display: flex; flex-wrap: wrap; gap: 10px; align-items: center; }
    .col { display: flex; flex-direction: column; gap: 12px; }
  </style>
  <script type="module" src="/src/index.ts"></script>
</head>
<body>
  <h1>thundrex Dev Playground</h1>
  <p class="sub">Use this page to test components during development. For full docs, run <code>npm run docs:dev</code>.</p>

  <section>
    <h2>Buttons</h2>
    <div class="row">
      <tx-button>Default</tx-button>
      <tx-button variant="primary">Primary</tx-button>
      <tx-button variant="accent">Accent</tx-button>
      <tx-button variant="ghost">Ghost</tx-button>
    </div>
  </section>

  <section>
    <h2>Inputs</h2>
    <div class="col">
      <tx-input label="Name" placeholder="Enter name"></tx-input>
      <tx-input search placeholder="Search..."></tx-input>
    </div>
  </section>

  <section>
    <h2>Controls</h2>
    <div class="row" style="gap:24px;">
      <tx-toggle label="Wi-Fi" checked></tx-toggle>
      <tx-checkbox label="Accept terms"></tx-checkbox>
    </div>
  </section>

  <section>
    <h2>Slider</h2>
    <tx-slider label="Volume" show-value value="65"></tx-slider>
  </section>

  <section>
    <h2>Tags & Badges</h2>
    <div class="row">
      <tx-badge color="primary">Primary</tx-badge>
      <tx-badge color="success" dot>Online</tx-badge>
      <tx-tag color="accent">Frontend</tx-tag>
      <tx-tag removable color="danger">Blocked</tx-tag>
    </div>
  </section>

  <section>
    <h2>Card</h2>
    <tx-card accent="primary">
      <h3 slot="header">Project Alpha</h3>
      <p>A sample card with accent bar.</p>
      <div slot="footer">
        <tx-button size="sm" variant="primary">View</tx-button>
      </div>
    </tx-card>
  </section>
</body>
</html>
